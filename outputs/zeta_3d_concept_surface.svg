<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="3D conceptual surface for zeta branching">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1021"/>
      <stop offset="100%" stop-color="#1f2340"/>
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd166" stop-opacity="0.92"/>
      <stop offset="55%" stop-color="#06d6a0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#118ab2" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="url(#bg)"/>

  <g opacity="0.28" stroke="#8ecae6" stroke-width="1.2" fill="none">
