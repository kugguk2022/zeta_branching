  <g stroke="#caf0f8" stroke-width="2" opacity="0.65" fill="none">
    <path d="M170 620 C280 580, 330 460, 420 470 C520 485, 590 640, 700 610 C790 585, 850 430, 950 450 C1010 462, 1060 520, 1090 560"/>
    <path d="M150 570 C270 520, 330 410, 430 425 C530 440, 600 590, 710 560 C810 530, 870 380, 970 400 C1030 412, 1070 470, 1110 510"/>
    <path d="M130 520 C250 470, 320 360, 440 375 C540 390, 620 540, 730 510 C840 480, 900 330, 1000 350 C1060 362, 1100 420, 1130 460"/>
  </g>

