    <path d="M180 645 C285 603, 355 495, 460 508 C575 523, 645 678, 760 648 C865 620, 935 460, 1035 480"/>
    <path d="M210 610 C315 568, 385 458, 490 470 C600 484, 670 638, 785 608 C885 582, 950 430, 1045 448"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#e6f4ff">
    <text x="72" y="92" font-size="38" font-weight="700">Zeta Branching 3D Intuition</text>
    <text x="74" y="126" font-size="22" opacity="0.9">Height: transformed response   •   Color: magnitude intensity</text>

    <text x="72" y="708" font-size="20" opacity="0.9">Im(z) axis</text>
    <text x="1020" y="705" font-size="20" opacity="0.9">Re(z) axis</text>
    <text x="565" y="168" font-size="20" opacity="0.9">Response amplitude</text>
  </g>

  <g stroke="#bde0fe" stroke-width="2.5">
    <line x1="170" y1="680" x2="1045" y2="680"/>
    <line x1="170" y1="680" x2="90" y2="505"/>
    <line x1="600" y1="430" x2="600" y2="130"/>
  </g>
</svg>
